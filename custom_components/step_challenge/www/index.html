<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Step Challenge</title>
<style>
  :root {
    --bg:#0f0f1a; --surface:#1a1a2e; --track:#12122a;
    --accent:#e94560; --gold:#ffd700; --silver:#c0c0c0;
    --bronze:#cd7f32; --text:#e8e8f0; --muted:#6b6b8a; --r:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}

  .header{background:linear-gradient(135deg,#0f0f1a,#1a1a2e);padding:14px 18px 12px;
    border-bottom:2px solid var(--accent);display:flex;align-items:center;gap:12px;}
  .header h1{font-size:1.2rem;font-weight:700;letter-spacing:.05em;}
  .header .sub{font-size:.72rem;color:var(--muted);margin-top:2px;}
  .hl{flex:1;}
  .badge{padding:3px 10px;border-radius:20px;font-size:.68rem;font-weight:700;
    letter-spacing:.1em;text-transform:uppercase;}
  .b-active  {background:#0ead6922;color:#0ead69;border:1px solid #0ead69;}
  .b-inactive{background:#e9456022;color:var(--accent);border:1px solid var(--accent);}
  .b-finished{background:#ffd70022;color:var(--gold);border:1px solid var(--gold);}

  .prog-wrap{background:var(--surface);padding:12px 18px;border-bottom:1px solid #ffffff10;}
  .prog-meta{display:flex;justify-content:space-between;font-size:.72rem;color:var(--muted);margin-bottom:7px;}
  .prog-meta b{color:var(--text);}
  .prog-bg{height:8px;background:#ffffff10;border-radius:4px;overflow:hidden;}
  .prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));
    border-radius:4px;transition:width 1s ease;}

  .win-banner{margin:14px 16px 0;background:#ffd70015;border:1px solid var(--gold);
    border-radius:var(--r);padding:14px;text-align:center;animation:pulse 2s infinite;}
  .win-banner h2{font-size:1.2rem;color:var(--gold);}
  .win-banner p{font-size:.8rem;color:var(--muted);margin-top:4px;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,215,0,.3);}50%{box-shadow:0 0 0 8px rgba(255,215,0,0);}}

  .sec{padding:14px 16px 6px;}
  .sec-label{font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}

  .lane{background:var(--track);border-radius:var(--r);border:1px solid #ffffff08;margin-bottom:9px;overflow:hidden;}
  .lane-inner{padding:9px 12px;display:flex;align-items:center;gap:9px;}
  .l-rank  {font-size:1.1rem;width:26px;text-align:center;flex-shrink:0;}
  .l-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;
    justify-content:center;font-size:1rem;flex-shrink:0;border:2px solid transparent;}
  .l-info  {flex:1;min-width:0;}
  .l-name  {font-size:.88rem;font-weight:600;}
  .l-steps {font-size:.68rem;color:var(--muted);margin-top:2px;}
  .l-steps b{color:var(--gold);}
  .l-bar-wrap{flex:2;min-width:0;}
  .l-bar-bg  {height:13px;background:#ffffff08;border-radius:7px;overflow:hidden;position:relative;}
  .l-bar-fill{height:100%;border-radius:7px;transition:width 1.2s cubic-bezier(.34,1.56,.64,1);position:relative;}
  .l-bar-fill::after{content:'';position:absolute;right:0;top:0;height:100%;width:18px;
    background:rgba(255,255,255,.2);border-radius:7px;animation:shim 1.5s infinite;}
  @keyframes shim{0%,100%{opacity:.3;}50%{opacity:.8;}}
  .l-fig{font-size:1.3rem;position:absolute;right:-2px;top:-3px;
    transition:all 1.2s cubic-bezier(.34,1.56,.64,1);
    filter:drop-shadow(0 0 4px rgba(255,215,0,.5));animation:bou .8s infinite alternate;}
  @keyframes bou{from{transform:translateY(0);}to{transform:translateY(-3px);}}
  .l-score{font-size:1.05rem;font-weight:800;min-width:32px;text-align:right;flex-shrink:0;}

  .cal-grid{display:flex;flex-wrap:wrap;gap:3px;}
  .cal-day{width:26px;height:26px;border-radius:5px;display:flex;align-items:center;
    justify-content:center;font-size:.58rem;font-weight:700;border:1px solid #ffffff10;
    background:#ffffff05;color:var(--muted);position:relative;cursor:default;transition:transform .2s;}
  .cal-day:hover{transform:scale(1.25);z-index:1;}
  .cal-day.today{border-color:var(--accent);color:var(--accent);}
  .cal-day.future{opacity:.3;}
  .dot{position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;}
  .leg{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;}
  .leg-item{display:flex;align-items:center;gap:4px;font-size:.68rem;color:var(--muted);}
  .leg-dot{width:9px;height:9px;border-radius:50%;}

  table{width:100%;border-collapse:collapse;font-size:.78rem;}
  th{text-align:left;color:var(--muted);font-weight:600;padding:5px 7px;
     border-bottom:1px solid #ffffff10;font-size:.67rem;}
  td{padding:6px 7px;border-bottom:1px solid #ffffff06;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:#ffffff05;}

  .empty{display:flex;align-items:center;justify-content:center;min-height:55vh;
    flex-direction:column;gap:12px;padding:40px 20px;text-align:center;}
  .empty .icon{font-size:3.5rem;}
  .empty h2{color:var(--muted);font-size:1.1rem;}
  .empty p{color:var(--muted);font-size:.82rem;max-width:280px;}

  .spin-wrap{display:flex;align-items:center;justify-content:center;height:100vh;
    gap:14px;flex-direction:column;color:var(--muted);}
  .spin{width:34px;height:34px;border:3px solid #ffffff10;border-top-color:var(--accent);
    border-radius:50%;animation:sp .8s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}

  .btn-wrap{padding:12px 16px 20px;display:flex;gap:8px;flex-wrap:wrap;}
  .btn{padding:9px 18px;border-radius:8px;border:none;font-size:.82rem;font-weight:600;
    cursor:pointer;transition:opacity .2s;}
  .btn:hover{opacity:.8;}
  .btn-start{background:#0ead6922;color:#0ead69;border:1px solid #0ead69;}
  .btn-stop {background:#e9456022;color:var(--accent);border:1px solid var(--accent);}
  .btn-rec  {background:#ffd70022;color:var(--gold);border:1px solid var(--gold);}

  @media(max-width:460px){.l-bar-wrap{display:none;}}
</style>
</head>
<body>
<div id="app"><div class="spin-wrap"><div class="spin"></div><span>Connecting…</span></div></div>

<script>
// ── Visual config – cycles for unlimited participants ─────────────────────────
const COLORS  = ['#ffd700','#c0c0c0','#cd7f32','#5b8de8','#0ead69','#e94560','#b06cff','#ff9800','#00bcd4','#ff5722'];
const FIGURES = ['🚀','🌟','💫','⚡','🔥','🎯','🏅','💎','🦁','🐉'];
const MEDALS  = ['🥇','🥈','🥉'];

// ── HA WebSocket ──────────────────────────────────────────────────────────────
let ws, mid=1, pending={}, haStates={}, storeData={};

function connect(){
  const proto=location.protocol==='https:'?'wss:':'ws:';
  ws=new WebSocket(`${proto}//${location.host}/api/websocket`);
  ws.onclose=()=>setTimeout(connect,3000);
  ws.onmessage=e=>onMsg(JSON.parse(e.data));
}

function send(msg){
  return new Promise((res,rej)=>{const id=mid++;msg.id=id;pending[id]={res,rej};ws.send(JSON.stringify(msg));});
}

async function onMsg(m){
  if(m.type==='auth_required'){ws.send(JSON.stringify({type:'auth',access_token:await tok()}));return;}
  if(m.type==='auth_ok'){await init();return;}
  if(m.type==='result'&&pending[m.id]){
    m.success?pending[m.id].res(m.result):pending[m.id].rej(m.error);
    delete pending[m.id];return;
  }
  if(m.type==='event'){
    const et=m.event?.event_type;
    if(et==='state_changed'){const s=m.event.data.new_state;if(s){haStates[s.entity_id]=s;sched();}}
    if(['step_challenge_data_updated','step_challenge_started','step_challenge_stopped'].includes(et)){
      await loadStore();sched();
    }
  }
}

async function tok(){
  const p=new URLSearchParams(location.search);if(p.get('token'))return p.get('token');
  return localStorage.getItem('ha_access_token')||'';
}

async function callService(domain,service){
  const t=await tok();
  await fetch(`${location.origin}/api/services/${domain}/${service}`,{
    method:'POST',headers:{'Authorization':`Bearer ${t}`,'Content-Type':'application/json'},
    body:JSON.stringify({})
  });
}

async function init(){
  const all=await send({type:'get_states'});
  all.forEach(s=>{haStates[s.entity_id]=s;});
  await loadStore();
  await send({type:'subscribe_events',event_type:'state_changed'});
  await send({type:'subscribe_events',event_type:'step_challenge_data_updated'});
  await send({type:'subscribe_events',event_type:'step_challenge_started'});
  await send({type:'subscribe_events',event_type:'step_challenge_stopped'});
  render();
}

async function loadStore(){
  try{
    const t=await tok();
    const r=await fetch(`${location.origin}/api/storage/step_challenge.data`,
      {headers:{Authorization:`Bearer ${t}`}});
    if(r.ok)storeData=await r.json();else storeData={};
  }catch(e){storeData={};}
}

// ── State helpers ─────────────────────────────────────────────────────────────
function find(sub){return Object.values(haStates).find(s=>s.entity_id.includes('step_challenge')&&s.entity_id.includes(sub));}
function stNum(id){const v=parseFloat(haStates[id]?.state);return isNaN(v)?0:v;}

function getStatus()  {return find('_status')?.state||'inactive';}
function getElapsed() {return parseInt(find('days_elapsed')?.state)||0;}
function getTotal()   {return parseInt(find('days_elapsed')?.attributes?.duration_days)||30;}
function getPct()     {return parseInt(find('days_elapsed')?.attributes?.progress_pct)||0;}
function getName()    {
  const s=find('_status');if(!s)return 'Step Challenge';
  const n=(s.attributes?.friendly_name||'Step Challenge');
  return n.replace(/\s*Status$/i,'');
}

function getParticipants(){
  const leader=find('leader');
  if(!leader?.attributes?.scores)return[];
  // Gather stage sensors for step entity info
  const stageSensors=Object.values(haStates).filter(s=>
    s.entity_id.includes('step_challenge')&&s.entity_id.includes('stage')
  );
  return Object.entries(leader.attributes.scores).map(([name,score])=>{
    const key=name.toLowerCase().replace(/\s+/g,'_');
    const sensor=stageSensors.find(s=>(s.attributes?.participant_key||'')=== key);
    const stepEnt=sensor?.attributes?.step_entity||null;
    return{name,score,key,steps:stepEnt?stNum(stepEnt):0,wonDates:sensor?.attributes?.won_dates||[]};
  });
}

function fmt(n){return Number(n).toLocaleString('de-DE');}
function fmtD(iso){if(!iso)return'—';return new Date(iso).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});}

// ── Render ────────────────────────────────────────────────────────────────────
let rt=null;
function sched(){if(rt)return;rt=setTimeout(()=>{rt=null;render();},400);}

function render(){
  const status=getStatus(),elapsed=getElapsed(),total=getTotal(),pct=getPct(),name=getName();
  const bCls=status==='active'?'b-active':status==='finished'?'b-finished':'b-inactive';
  const bTxt=status==='active'?'Running':status==='finished'?'Finished':'Inactive';

  let h=`<div class="header">
    <div class="hl"><h1>🏁 ${name}</h1><div class="sub">Day ${elapsed} of ${total}</div></div>
    <div class="badge ${bCls}">${bTxt}</div>
  </div>
  <div class="prog-wrap">
    <div class="prog-meta"><span>Progress</span><b>${pct}%</b></div>
    <div class="prog-bg"><div class="prog-fill" style="width:${pct}%"></div></div>
  </div>`;

  // Action buttons
  h+=`<div class="btn-wrap">
    <button class="btn btn-start" onclick="callService('step_challenge','start')">🚩 Start</button>
    <button class="btn btn-stop"  onclick="callService('step_challenge','stop')">⏹ Stop</button>
    <button class="btn btn-rec"   onclick="callService('step_challenge','record_day')">📋 Record Day</button>
  </div>`;

  if(status==='inactive'){
    h+=`<div class="empty"><div class="icon">🏃</div><h2>No challenge active</h2>
      <p>Press Start to begin the race.</p></div>`;
    document.getElementById('app').innerHTML=h;return;
  }

  const parts=getParticipants().sort((a,b)=>b.score-a.score||b.steps-a.steps);
  if(!parts.length){
    h+=`<div class="empty"><div class="icon">⚙️</div><h2>Loading…</h2></div>`;
    document.getElementById('app').innerHTML=h;return;
  }

  if(status==='finished'){
    const w=parts[0];
    h+=`<div class="win-banner"><h2>🏆 ${w.name} wins!</h2><p>${w.score} of ${total} stages won</p></div>`;
  }

  // Race lanes
  const maxS=Math.max(...parts.map(p=>p.score),1);
  h+=`<div class="sec"><div class="sec-label">🏎 Race – Stage Wins</div>`;
  parts.forEach((p,i)=>{
    const c=COLORS[i%COLORS.length],fig=FIGURES[i%FIGURES.length],med=MEDALS[i]||(i+1)+'.';
    const bp=Math.max(4,Math.round((p.score/maxS)*100));
    h+=`<div class="lane"><div class="lane-inner">
      <div class="l-rank">${med}</div>
      <div class="l-avatar" style="border-color:${c};background:${c}18">🏃</div>
      <div class="l-info">
        <div class="l-name" style="color:${c}">${p.name}</div>
        <div class="l-steps">Today: <b>${fmt(p.steps)}</b> steps</div>
      </div>
      <div class="l-bar-wrap"><div class="l-bar-bg">
        <div class="l-bar-fill" data-pct="${bp}" style="width:4%;background:linear-gradient(90deg,${c}88,${c})">
          <span class="l-fig">${fig}</span>
        </div>
      </div></div>
      <div class="l-score" style="color:${c}">${p.score}</div>
    </div></div>`;
  });
  h+=`</div>`;

  // Calendar
  const history=storeData?.history||[];
  const startIso=storeData?.start;
  if(elapsed>0&&startIso) h+=renderCal(elapsed,total,parts,history,startIso);

  // Recent table
  if(history.length>0) h+=renderTable(history.slice(-7).reverse(),parts);

  document.getElementById('app').innerHTML=h;

  setTimeout(()=>{
    document.querySelectorAll('.l-bar-fill[data-pct]').forEach(el=>{
      const w=el.dataset.pct+'%';el.style.width='0%';
      requestAnimationFrame(()=>requestAnimationFrame(()=>{el.style.width=w;}));
    });
  },60);
}

function renderCal(elapsed,total,parts,history,startIso){
  const startDt=new Date(startIso);
  const today=new Date();today.setHours(0,0,0,0);
  const cMap={};parts.forEach((p,i)=>{cMap[p.key]=COLORS[i%COLORS.length];});

  let h=`<div class="sec"><div class="sec-label">📅 Stage Calendar</div><div class="cal-grid">`;
  for(let d=0;d<total;d++){
    const dd=new Date(startDt.getTime()+d*86400000);dd.setHours(0,0,0,0);
    const isT=dd.getTime()===today.getTime();
    const isF=dd>today;
    const ent=history.find(e=>{const ed=new Date(e.date);ed.setHours(0,0,0,0);return Math.round((ed-startDt)/86400000)===d;});
    const w=ent?.winner;const wc=w?(cMap[w]||'#888'):null;
    let cls='cal-day';if(isT)cls+=' today';if(isF)cls+=' future';
    const bg=wc?`background:${wc}18;border-color:${wc}55;`:'';
    const dot=wc?`<div class="dot" style="background:${wc}"></div>`:'';
    h+=`<div class="${cls}" style="${bg}" title="Day ${d+1}${w?' · '+w:''}">${d+1}${dot}</div>`;
  }
  h+=`</div><div class="leg">`;
  parts.forEach((p,i)=>{h+=`<div class="leg-item"><div class="leg-dot" style="background:${COLORS[i%COLORS.length]}"></div>${p.name}</div>`;});
  h+=`</div></div>`;
  return h;
}

function renderTable(recent,parts){
  let h=`<div class="sec"><div class="sec-label">📊 Recent Stages</div><table>
    <thead><tr><th>#</th><th>Date</th><th>Winner</th>`;
  parts.forEach(p=>{h+=`<th>${p.name}</th>`;});
  h+=`</tr></thead><tbody>`;
  recent.forEach((e,i)=>{
    const wk=e.winner||'';const wp=parts.find(p=>p.key===wk);
    h+=`<tr><td style="color:var(--muted)">${recent.length-i}</td>
      <td style="color:var(--muted);font-size:.7rem">${fmtD(e.date)}</td>
      <td>${wp?wp.name:'—'}</td>`;
    parts.forEach((p,pi)=>{
      const v=e.steps?.[p.key];const isW=wk===p.key;
      h+=`<td style="color:${isW?COLORS[pi%COLORS.length]:'var(--muted)'};font-weight:${isW?700:400}">${v!==undefined?fmt(v):'—'}</td>`;
    });
    h+=`</tr>`;
  });
  h+=`</tbody></table></div>`;
  return h;
}

connect();
</script>
</body>
</html>
