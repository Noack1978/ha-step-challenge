start:
  name: Start Challenge
  description: >
    Start the Step Challenge. Resets all scores and sets the start date to today.

stop:
  name: Stop Challenge
  description: >
    Stop the running Step Challenge before the configured end date.

record_day:
  name: Record Day
  description: >
    Evaluate today's step counts, determine the stage winner, and update scores.
    Called automatically at 00:01 by the managed automation – can also be triggered manually.
