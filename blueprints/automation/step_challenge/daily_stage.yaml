blueprint:
  name: "Step Challenge – Daily Stage"
  description: >
    Evaluates the step counts every day at 00:01 and records the stage winner.
    Requires the Step Challenge integration to be installed and a challenge to be active.
  domain: automation
  source_url: https://github.com/Noack1978/ha-step-challenge/blob/main/blueprints/automation/step_challenge/daily_stage.yaml

trigger:
  - platform: time
    at: "00:01:00"

condition:
  - condition: template
    value_template: >
      {{ states | selectattr('entity_id', 'search', 'step_challenge.*status') | map(attribute='state') | list | first | default('inactive') == 'active' }}

action:
  - service: step_challenge.record_day
    data: {}

mode: single
