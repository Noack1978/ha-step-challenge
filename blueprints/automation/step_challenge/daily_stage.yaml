blueprint:
  name: "Step Challenge – Daily Stage"
  description: >
    Evaluates the step counts at a configurable time each day and records the stage winner.
    Use this blueprint only if the automatic automation creation failed.
    Requires the Step Challenge integration to be installed and a challenge to be active.
  domain: automation
  source_url: https://github.com/Noack1978/ha-step-challenge/blob/main/blueprints/automation/step_challenge/daily_stage.yaml
  input:
    record_time:
      name: Evaluation time
      description: >
        Time at which the daily stage winner is determined.
        Choose a time when all devices have finished syncing their steps.
      default: "23:00:00"
      selector:
        time: {}

trigger:
  - platform: time
    at: !input record_time

condition:
  - condition: template
    value_template: >
      {{ states | selectattr('entity_id', 'search', 'step_challenge.*status')
         | map(attribute='state') | list | first | default('inactive') == 'active' }}

action:
  - service: step_challenge.record_day
    data: {}

mode: single
