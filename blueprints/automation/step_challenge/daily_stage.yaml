blueprint:
  name: "Step Challenge – Daily Stage"
  description: >
    Evaluates the step counts at a configurable time each day and records the stage winner.
    Import this blueprint after installing the Step Challenge integration.
  domain: automation
  source_url: https://github.com/Noack1978/ha-step-challenge/blob/main/blueprints/automation/step_challenge/daily_stage.yaml
  input:
    record_time:
      name: Auswertungszeit / Evaluation time
      description: >
        DE: Uhrzeit der täglichen Auswertung. Wähle eine Zeit, zu der alle Geräte
        ihre Schritte synchronisiert haben (empfohlen 22:00–23:00 Uhr).

        EN: Time at which the daily stage winner is determined. Choose a time when
        all devices have finished syncing their steps (recommended 22:00–23:00).
      default: "23:00:00"
      selector:
        time: {}

trigger:
  - platform: time
    at: !input record_time

condition:
  - condition: template
    value_template: >
      {{ states | selectattr('entity_id', 'search', 'sensor\\.step_challenge.*_status')
         | map(attribute='state') | list | first | default('inactive') == 'active' }}

action:
  - action: step_challenge.record_day
    data: {}

mode: single
